<svg width="720" height="360" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ai-venn-title ai-venn-desc">
  <title id="ai-venn-title">人工智能、机器学习、深度学习和大语言模型的包含关系</title>
  <desc id="ai-venn-desc">人工智能是最大的范围，机器学习包含在人工智能中，深度学习包含在机器学习中，大语言模型包含在深度学习中。</desc>
  <rect width="720" height="360" fill="#ffffff"/>
  <ellipse cx="360" cy="180" rx="310" ry="145" fill="#e8f4ff" stroke="#2563eb" stroke-width="3"/>
  <ellipse cx="390" cy="190" rx="235" ry="110" fill="#e9f8ef" stroke="#16a34a" stroke-width="3"/>
  <ellipse cx="425" cy="200" rx="160" ry="76" fill="#fff4df" stroke="#f59e0b" stroke-width="3"/>
  <ellipse cx="455" cy="210" rx="88" ry="42" fill="#f4e8ff" stroke="#9333ea" stroke-width="3"/>

  <text x="105" y="115" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">人工智能</text>
  <text x="180" y="175" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#166534">机器学习</text>
  <text x="280" y="202" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="22" font-weight="700" fill="#92400e">深度学习</text>
  <text x="400" y="210" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="24" font-weight="700" fill="#581c87">大语言模型</text>

  <text x="75" y="135" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#1e40af">让机器完成智能任务</text>
  <text x="150" y="200" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#166534">从数据中学习规律</text>
  <text x="240" y="225" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#92400e">用神经网络处理复杂信息</text>
  <text x="415" y="235" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#581c87">语言任务的典型成果</text>
</svg>
